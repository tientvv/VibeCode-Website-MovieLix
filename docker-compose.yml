services:
  # ─── PostgreSQL 16 (Siêu nhẹ - chỉ ~100MB RAM) ─────
  db:
    image: postgres:16-alpine
    container_name: movielix-db
    environment:
      - POSTGRES_USER=movielix
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=movielix
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - movielix-net
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U movielix -d movielix
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Nuxt 3 Frontend ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: movielix-frontend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL}
      - NUXT_PUBLIC_STREAMING_URL=${NUXT_PUBLIC_STREAMING_URL}
      - NUXT_PUBLIC_TRUST_PROXY=true
      - NITRO_HTTPS=false
      - NITRO_HOST=0.0.0.0
      - NITRO_PORT=3000
    ports:
      - '3000:3000'
    networks:
      - movielix-net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # ─── Cloudflare Tunnel ─────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: movielix-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
      - TUNNEL_NO_TLS_VERIFY=true
      - TUNNEL_ORIGIN_ENABLE_HTTP2=false
    networks:
      - movielix-net
    restart: unless-stopped
    depends_on:
      - frontend

volumes:
  pg_data:
    driver: local
  subtitle_files:
    driver: local

networks:
  movielix-net:
    driver: bridge
